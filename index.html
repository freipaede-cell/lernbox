<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lernbox</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lernbox">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#0f172a">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0f172a;
  --card: #1e293b;
  --card-hover: #263549;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --accent: #38bdf8;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --pink: #f472b6;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --profile-color: var(--accent);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

.app {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  min-height: 56px;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.header-profile-name {
  font-size: 14px;
  color: var(--text-muted);
  padding: 4px 10px;
  background: rgba(255,255,255,0.06);
  border-radius: 20px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.08);
  color: var(--text);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-icon:active {
  background: rgba(255,255,255,0.15);
}

.header-back {
  font-size: 22px;
}

.header-progress {
  font-size: 14px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

/* ===== SCREENS ===== */
.screen {
  display: none;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 16px 24px;
}

.screen.active {
  display: flex;
  flex-direction: column;
}

.screen.no-scroll {
  overflow: hidden;
}

/* ===== PROFILE SELECT ===== */
#screen-profile {
  justify-content: center;
  align-items: center;
  gap: 20px;
  padding: 40px 24px;
}

.profile-title {
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
}

.profile-subtitle {
  font-size: 15px;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.profile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  width: 100%;
  max-width: 360px;
}

.profile-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 2px solid transparent;
}

.profile-card:active {
  transform: scale(0.96);
}

.profile-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 700;
  color: var(--bg);
}

.profile-card-name {
  font-size: 16px;
  font-weight: 600;
}

/* ===== LIBRARY ===== */
#screen-library {
  gap: 12px;
  padding-top: 8px;
}

.library-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 15px;
  line-height: 1.6;
}

.set-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  box-shadow: var(--shadow);
}

.set-card:active {
  transform: scale(0.98);
  background: var(--card-hover);
}

.set-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.set-card-title {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.3;
  flex: 1;
  margin-right: 12px;
}

.set-card-tag {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(56, 189, 248, 0.15);
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}

.set-card-meta {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.progress-bar-bg {
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
  min-width: 0;
}

.progress-bar-fill.gradient {
  background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
}

.set-card-progress-text {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
  text-align: right;
}

/* ===== LEARN VIEW ===== */
#screen-learn {
  justify-content: center;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
}

.flashcard-container {
  width: 100%;
  max-width: 400px;
  aspect-ratio: 3 / 4;
  max-height: 55vh;
  perspective: 1200px;
  cursor: pointer;
}

.flashcard {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
}

.flashcard.flipped {
  transform: rotateY(180deg);
}

.flashcard-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px;
  text-align: center;
  box-shadow: var(--shadow);
  overflow-y: auto;
}

.flashcard-front {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
}

.flashcard-back {
  background: linear-gradient(135deg, #1e3a5f, #1e293b);
  border: 1px solid rgba(56,189,248,0.2);
  transform: rotateY(180deg);
}

.flashcard-label {
  position: absolute;
  top: 16px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
}

.flashcard-text {
  font-size: 18px;
  line-height: 1.5;
  word-break: break-word;
}

.flashcard-front .flashcard-text {
  font-weight: 600;
  font-size: 20px;
}

.flashcard-box-indicator {
  position: absolute;
  bottom: 16px;
  font-size: 11px;
  color: var(--text-muted);
}

.answer-buttons {
  display: flex;
  gap: 16px;
  width: 100%;
  max-width: 400px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.answer-buttons.visible {
  opacity: 1;
  pointer-events: auto;
}

.btn-answer {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
  min-height: 54px;
  color: #fff;
}

.btn-answer:active {
  transform: scale(0.95);
}

.btn-nochmal {
  background: var(--red);
}

.btn-gewusst {
  background: var(--green);
  color: var(--bg);
}

.flashcard-slide-left {
  animation: slideLeft 0.3s ease forwards;
}

.flashcard-slide-right {
  animation: slideRight 0.3s ease forwards;
}

@keyframes slideLeft {
  to { transform: translateX(-120%) rotate(-8deg); opacity: 0; }
}

@keyframes slideRight {
  to { transform: translateX(120%) rotate(8deg); opacity: 0; }
}

.flashcard-enter {
  animation: cardEnter 0.3s ease forwards;
}

@keyframes cardEnter {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* ===== SESSION SUMMARY ===== */
.session-summary {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 20px;
  width: 100%;
  max-width: 400px;
}

.summary-title {
  font-size: 24px;
  font-weight: 700;
}

.summary-stats {
  display: flex;
  gap: 24px;
}

.summary-stat {
  text-align: center;
}

.summary-stat-value {
  font-size: 36px;
  font-weight: 700;
}

.summary-stat-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

.btn-primary {
  width: 100%;
  max-width: 400px;
  padding: 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  background: var(--accent);
  color: var(--bg);
  transition: transform 0.15s;
}

.btn-primary:active {
  transform: scale(0.97);
}

/* ===== STATS ===== */
#screen-stats {
  gap: 20px;
  padding-top: 8px;
}

.stats-chart-container {
  display: flex;
  justify-content: center;
  padding: 16px 0;
}

.stats-chart {
  position: relative;
  width: 180px;
  height: 180px;
}

.stats-chart svg {
  transform: rotate(-90deg);
}

.stats-chart-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.stats-chart-percent {
  font-size: 28px;
  font-weight: 700;
}

.stats-chart-label {
  font-size: 12px;
  color: var(--text-muted);
}

.stats-legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.stats-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-muted);
}

.stats-legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.stats-table {
  width: 100%;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
}

.stats-table-header {
  display: grid;
  grid-template-columns: 1fr 60px 70px;
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.stats-table-row {
  display: grid;
  grid-template-columns: 1fr 60px 70px;
  padding: 12px 16px;
  font-size: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  align-items: center;
}

.stats-table-row:last-child {
  border-bottom: none;
}

.stats-table-question {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-right: 8px;
}

.stats-table-box {
  text-align: center;
  font-weight: 600;
  font-size: 13px;
}

.stats-table-status {
  text-align: center;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}

.status-new { background: rgba(148,163,184,0.15); color: #94a3b8; }
.status-learning { background: rgba(251,191,36,0.15); color: var(--yellow); }
.status-mastered { background: rgba(74,222,128,0.15); color: var(--green); }

.btn-danger {
  width: 100%;
  padding: 14px;
  border: 2px solid var(--red);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--red);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.2s;
}

.btn-danger:active {
  background: rgba(248,113,113,0.15);
}

/* ===== CONFIRM DIALOG ===== */
.dialog-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.dialog-overlay.visible {
  display: flex;
}

.dialog-box {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px 24px;
  max-width: 320px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}

.dialog-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
}

.dialog-text {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
  line-height: 1.5;
}

.dialog-buttons {
  display: flex;
  gap: 12px;
}

.dialog-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.dialog-btn-cancel {
  background: rgba(255,255,255,0.08);
  color: var(--text);
}

.dialog-btn-confirm {
  background: var(--red);
  color: #fff;
}

/* ===== LOADING ===== */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
  color: var(--text-muted);
  font-size: 15px;
}

.spinner {
  width: 24px;
  height: 24px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 12px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <header class="header" id="app-header" style="display:none;">
    <div class="header-left">
      <button class="btn-icon header-back" id="btn-back" style="display:none;" aria-label="Zurueck">&#8249;</button>
      <span class="header-logo">Lernbox</span>
      <span class="header-profile-name" id="header-profile-name"></span>
    </div>
    <div class="header-right">
      <span class="header-progress" id="header-progress"></span>
      <button class="btn-icon" id="btn-stats" style="display:none;" aria-label="Statistik">&#9432;</button>
      <button class="btn-icon" id="btn-profile-switch" aria-label="Profil wechseln">&#9881;</button>
    </div>
  </header>

  <!-- SCREEN: PROFILE SELECT -->
  <div class="screen active" id="screen-profile">
    <div class="profile-title">Lernbox</div>
    <div class="profile-subtitle">Wer lernt heute?</div>
    <div class="profile-grid" id="profile-grid"></div>
  </div>

  <!-- SCREEN: LIBRARY -->
  <div class="screen" id="screen-library">
    <div id="library-content"></div>
  </div>

  <!-- SCREEN: LEARN -->
  <div class="screen no-scroll" id="screen-learn">
    <div class="flashcard-container" id="flashcard-container">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-face flashcard-front">
          <span class="flashcard-label">Frage</span>
          <div class="flashcard-text" id="flashcard-question"></div>
          <span class="flashcard-box-indicator" id="flashcard-box-front"></span>
        </div>
        <div class="flashcard-face flashcard-back">
          <span class="flashcard-label">Antwort</span>
          <div class="flashcard-text" id="flashcard-answer"></div>
          <span class="flashcard-box-indicator" id="flashcard-box-back"></span>
        </div>
      </div>
    </div>
    <div class="answer-buttons" id="answer-buttons">
      <button class="btn-answer btn-nochmal" id="btn-nochmal">Nochmal</button>
      <button class="btn-answer btn-gewusst" id="btn-gewusst">Gewusst!</button>
    </div>
    <!-- SESSION SUMMARY (shown at end) -->
    <div class="session-summary" id="session-summary" style="display:none;">
      <div class="summary-title">Session fertig!</div>
      <div class="summary-stats">
        <div class="summary-stat">
          <div class="summary-stat-value" id="summary-correct" style="color:var(--green)">0</div>
          <div class="summary-stat-label">Gewusst</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value" id="summary-wrong" style="color:var(--red)">0</div>
          <div class="summary-stat-label">Nochmal</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value" id="summary-total" style="color:var(--text-muted)">0</div>
          <div class="summary-stat-label">Total</div>
        </div>
      </div>
      <button class="btn-primary" id="btn-back-library">Zur Bibliothek</button>
    </div>
  </div>

  <!-- SCREEN: STATS -->
  <div class="screen" id="screen-stats">
    <div class="stats-chart-container">
      <div class="stats-chart">
        <svg viewBox="0 0 180 180" width="180" height="180" id="stats-svg"></svg>
        <div class="stats-chart-center">
          <span class="stats-chart-percent" id="stats-percent">0%</span>
          <span class="stats-chart-label">gemeistert</span>
        </div>
      </div>
    </div>
    <div class="stats-legend" id="stats-legend"></div>
    <div class="stats-table" id="stats-table"></div>
    <button class="btn-danger" id="btn-reset-progress">Fortschritt zuruecksetzen</button>
  </div>

  <!-- CONFIRM DIALOG -->
  <div class="dialog-overlay" id="dialog-overlay">
    <div class="dialog-box">
      <div class="dialog-title" id="dialog-title">Bist du sicher?</div>
      <div class="dialog-text" id="dialog-text">Der gesamte Fortschritt fuer dieses Set wird geloescht.</div>
      <div class="dialog-buttons">
        <button class="dialog-btn dialog-btn-cancel" id="dialog-cancel">Abbrechen</button>
        <button class="dialog-btn dialog-btn-confirm" id="dialog-confirm">Zuruecksetzen</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===== CONFIG =====
  const PROFILES = [
    { name: 'Yannick', color: '#38bdf8' },
    { name: 'Livia',   color: '#f472b6' },
    { name: 'Karin',   color: '#4ade80' },
    { name: 'Patrick', color: '#fbbf24' }
  ];
  const SESSION_SIZE = 15;
  const SETS_INDEX_URL = 'sets/index.json';

  // ===== STATE =====
  let activeProfile = null;
  let setsIndex = [];
  let setsCache = {};
  let currentSetId = null;
  let currentSetData = null;
  let sessionCards = [];
  let sessionIndex = 0;
  let sessionCorrect = 0;
  let sessionWrong = 0;
  let isFlipped = false;
  let isAnimating = false;

  // ===== DOM REFS =====
  const $ = id => document.getElementById(id);
  const header = $('app-header');
  const btnBack = $('btn-back');
  const btnStats = $('btn-stats');
  const btnProfileSwitch = $('btn-profile-switch');
  const headerProfileName = $('header-profile-name');
  const headerProgress = $('header-progress');

  const screenProfile = $('screen-profile');
  const screenLibrary = $('screen-library');
  const screenLearn = $('screen-learn');
  const screenStats = $('screen-stats');

  const profileGrid = $('profile-grid');
  const libraryContent = $('library-content');

  const flashcardContainer = $('flashcard-container');
  const flashcard = $('flashcard');
  const flashcardQuestion = $('flashcard-question');
  const flashcardAnswer = $('flashcard-answer');
  const flashcardBoxFront = $('flashcard-box-front');
  const flashcardBoxBack = $('flashcard-box-back');
  const answerButtons = $('answer-buttons');
  const btnNochmal = $('btn-nochmal');
  const btnGewusst = $('btn-gewusst');

  const sessionSummary = $('session-summary');
  const summaryCorrect = $('summary-correct');
  const summaryWrong = $('summary-wrong');
  const summaryTotal = $('summary-total');
  const btnBackLibrary = $('btn-back-library');

  const dialogOverlay = $('dialog-overlay');
  const dialogCancel = $('dialog-cancel');
  const dialogConfirm = $('dialog-confirm');

  const btnResetProgress = $('btn-reset-progress');

  // ===== NAVIGATION =====
  let currentScreen = 'profile';
  let navStack = [];

  function showScreen(name, pushStack) {
    if (pushStack !== false) navStack.push(currentScreen);
    currentScreen = name;

    [screenProfile, screenLibrary, screenLearn, screenStats].forEach(s => s.classList.remove('active'));

    header.style.display = name === 'profile' ? 'none' : 'flex';
    btnBack.style.display = (name === 'library') ? 'none' : (name !== 'profile' ? 'block' : 'none');
    btnStats.style.display = name === 'learn' ? 'block' : 'none';
    headerProgress.textContent = '';

    switch (name) {
      case 'profile':
        screenProfile.classList.add('active');
        break;
      case 'library':
        screenLibrary.classList.add('active');
        break;
      case 'learn':
        screenLearn.classList.add('active');
        break;
      case 'stats':
        screenStats.classList.add('active');
        break;
    }
  }

  function goBack() {
    if (navStack.length) {
      const prev = navStack.pop();
      showScreen(prev, false);
      if (prev === 'library') renderLibrary();
    }
  }

  // ===== LOCAL STORAGE HELPERS =====
  function getProgressKey(setId) {
    return 'lernbox_' + activeProfile + '_' + setId;
  }

  function loadProgress(setId) {
    try {
      const raw = localStorage.getItem(getProgressKey(setId));
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  }

  function saveProgress(setId, data) {
    localStorage.setItem(getProgressKey(setId), JSON.stringify(data));
  }

  function resetProgress(setId) {
    localStorage.removeItem(getProgressKey(setId));
  }

  function getCardProgress(setId, cardIndex) {
    const prog = loadProgress(setId);
    if (!prog || !prog.cards || !prog.cards[cardIndex]) {
      return { box: 1, lastSeen: 0, correctCount: 0 };
    }
    return prog.cards[cardIndex];
  }

  function setCardProgress(setId, cardIndex, cardProg) {
    let prog = loadProgress(setId) || { cards: {} };
    if (!prog.cards) prog.cards = {};
    prog.cards[cardIndex] = cardProg;
    saveProgress(setId, prog);
  }

  // ===== PROFILE =====
  function initProfiles() {
    profileGrid.innerHTML = '';
    PROFILES.forEach(p => {
      const card = document.createElement('div');
      card.className = 'profile-card';
      card.innerHTML = `
        <div class="profile-avatar" style="background:${p.color}">${p.name[0]}</div>
        <div class="profile-card-name">${p.name}</div>
      `;
      card.addEventListener('click', () => selectProfile(p.name));
      profileGrid.appendChild(card);
    });
  }

  function selectProfile(name) {
    activeProfile = name;
    localStorage.setItem('lernbox_activeProfile', name);
    const prof = PROFILES.find(p => p.name === name);
    document.documentElement.style.setProperty('--profile-color', prof ? prof.color : '#38bdf8');
    headerProfileName.textContent = name;
    headerProfileName.style.color = prof ? prof.color : '';
    loadSetsIndex().then(() => {
      showScreen('library');
      renderLibrary();
    });
  }

  // ===== SETS INDEX =====
  async function loadSetsIndex() {
    if (setsIndex.length) return;
    try {
      const resp = await fetch(SETS_INDEX_URL);
      const data = await resp.json();
      setsIndex = data.sets || [];
    } catch (e) {
      setsIndex = [];
      console.warn('Konnte sets/index.json nicht laden:', e);
    }
  }

  async function loadSetData(setInfo) {
    if (setsCache[setInfo.id]) return setsCache[setInfo.id];
    try {
      const resp = await fetch(setInfo.file);
      const data = await resp.json();
      setsCache[setInfo.id] = data;
      return data;
    } catch (e) {
      console.warn('Konnte Set nicht laden:', setInfo.file, e);
      return null;
    }
  }

  // ===== LIBRARY RENDERING =====
  function getSetStats(setId, cardCount) {
    const prog = loadProgress(setId);
    if (!prog || !prog.cards) return { mastered: 0, learning: 0, newCards: cardCount, percent: 0 };
    let mastered = 0, learning = 0;
    for (let i = 0; i < cardCount; i++) {
      const c = prog.cards[i];
      if (c) {
        if (c.box >= 4) mastered++;
        else if (c.box > 1) learning++;
      }
    }
    const newCards = cardCount - mastered - learning;
    const percent = cardCount > 0 ? Math.round((mastered / cardCount) * 100) : 0;
    return { mastered, learning, newCards, percent };
  }

  function renderLibrary() {
    if (!setsIndex.length) {
      libraryContent.innerHTML = '<div class="library-empty">Keine Lernsets gefunden.<br>Lege JSON-Dateien im Ordner <code>sets/</code> ab.</div>';
      return;
    }
    let html = '';
    setsIndex.forEach(set => {
      const stats = getSetStats(set.id, set.cardCount);
      const progressWidth = stats.percent;
      html += `
        <div class="set-card" data-set-id="${set.id}">
          <div class="set-card-top">
            <div class="set-card-title">${esc(set.title)}</div>
            <span class="set-card-tag">${esc(set.subject)}</span>
          </div>
          <div class="set-card-meta">${set.cardCount} Karten</div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill gradient" style="width:${progressWidth}%"></div>
          </div>
          <div class="set-card-progress-text">${stats.percent}% gemeistert</div>
        </div>
      `;
    });
    libraryContent.innerHTML = html;

    libraryContent.querySelectorAll('.set-card').forEach(card => {
      card.addEventListener('click', () => {
        const setId = card.dataset.setId;
        startLearning(setId);
      });
    });
  }

  // ===== LEARNING =====
  async function startLearning(setId) {
    const setInfo = setsIndex.find(s => s.id === setId);
    if (!setInfo) return;

    libraryContent.innerHTML = '<div class="loading"><div class="spinner"></div>Lade Karten...</div>';

    const data = await loadSetData(setInfo);
    if (!data || !data.cards) {
      libraryContent.innerHTML = '<div class="library-empty">Fehler beim Laden des Sets.</div>';
      return;
    }

    currentSetId = setId;
    currentSetData = data;

    // Build session: prioritize lower boxes
    const cardEntries = data.cards.map((card, idx) => {
      const prog = getCardProgress(setId, idx);
      return { index: idx, card, prog };
    });

    // Sort: box ASC, then shuffle within same box
    cardEntries.sort((a, b) => {
      if (a.prog.box !== b.prog.box) return a.prog.box - b.prog.box;
      return Math.random() - 0.5;
    });

    sessionCards = cardEntries.slice(0, SESSION_SIZE);
    sessionIndex = 0;
    sessionCorrect = 0;
    sessionWrong = 0;

    showScreen('learn');
    sessionSummary.style.display = 'none';
    flashcardContainer.style.display = 'block';
    answerButtons.classList.remove('visible');
    showCurrentCard();
  }

  function showCurrentCard() {
    if (sessionIndex >= sessionCards.length) {
      showSessionSummary();
      return;
    }

    const entry = sessionCards[sessionIndex];
    isFlipped = false;
    isAnimating = false;
    flashcard.classList.remove('flipped');
    answerButtons.classList.remove('visible');

    flashcardQuestion.innerHTML = formatText(entry.card.front || entry.card.question || entry.card.q || '');
    flashcardAnswer.innerHTML = formatText(entry.card.back || entry.card.answer || entry.card.a || '');

    const boxLabel = 'Box ' + entry.prog.box;
    flashcardBoxFront.textContent = boxLabel;
    flashcardBoxBack.textContent = boxLabel;

    headerProgress.textContent = (sessionIndex + 1) + '/' + sessionCards.length;

    flashcardContainer.classList.remove('flashcard-slide-left', 'flashcard-slide-right', 'flashcard-enter');
    void flashcardContainer.offsetWidth;
    flashcardContainer.classList.add('flashcard-enter');
  }

  function flipCard() {
    if (isFlipped || isAnimating) return;
    isFlipped = true;
    flashcard.classList.add('flipped');
    setTimeout(() => {
      answerButtons.classList.add('visible');
    }, 300);
  }

  function answerCard(correct) {
    if (isAnimating) return;
    isAnimating = true;

    const entry = sessionCards[sessionIndex];
    const prog = entry.prog;

    if (correct) {
      prog.box = Math.min(prog.box + 1, 5);
      prog.correctCount = (prog.correctCount || 0) + 1;
      sessionCorrect++;
    } else {
      prog.box = 1;
      sessionWrong++;
    }
    prog.lastSeen = Date.now();

    setCardProgress(currentSetId, entry.index, prog);

    const animClass = correct ? 'flashcard-slide-right' : 'flashcard-slide-left';
    flashcardContainer.classList.add(animClass);
    answerButtons.classList.remove('visible');

    setTimeout(() => {
      flashcardContainer.classList.remove(animClass);
      sessionIndex++;
      showCurrentCard();
    }, 300);
  }

  function showSessionSummary() {
    flashcardContainer.style.display = 'none';
    answerButtons.classList.remove('visible');
    headerProgress.textContent = '';
    btnStats.style.display = 'none';

    summaryCorrect.textContent = sessionCorrect;
    summaryWrong.textContent = sessionWrong;
    summaryTotal.textContent = sessionCards.length;
    sessionSummary.style.display = 'flex';
  }

  // ===== STATS =====
  function renderStats() {
    if (!currentSetData || !currentSetId) return;

    const cards = currentSetData.cards;
    const total = cards.length;
    let mastered = 0, learning = 0, newCount = 0;
    const rows = [];

    cards.forEach((card, idx) => {
      const prog = getCardProgress(currentSetId, idx);
      let status, statusClass;
      if (prog.box >= 4) { mastered++; status = 'Gemeistert'; statusClass = 'status-mastered'; }
      else if (prog.box > 1) { learning++; status = 'Lernt'; statusClass = 'status-learning'; }
      else { newCount++; status = 'Neu'; statusClass = 'status-new'; }
      rows.push({ question: card.front || card.question || card.q || '', box: prog.box, status, statusClass });
    });

    const percent = total > 0 ? Math.round((mastered / total) * 100) : 0;
    $('stats-percent').textContent = percent + '%';

    // Donut chart
    const r = 75, cx = 90, cy = 90, strokeW = 18;
    const circ = 2 * Math.PI * r;
    const segments = [
      { count: mastered, color: '#4ade80' },
      { count: learning, color: '#fbbf24' },
      { count: newCount, color: '#475569' }
    ];

    let svg = '';
    // Background circle
    svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e293b" stroke-width="${strokeW}"/>`;

    let offset = 0;
    segments.forEach(seg => {
      if (seg.count === 0) return;
      const len = (seg.count / total) * circ;
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${strokeW}" stroke-dasharray="${len} ${circ - len}" stroke-dashoffset="${-offset}" stroke-linecap="round"/>`;
      offset += len;
    });

    $('stats-svg').innerHTML = svg;

    // Legend
    $('stats-legend').innerHTML = `
      <div class="stats-legend-item"><span class="stats-legend-dot" style="background:#4ade80"></span>Gemeistert (${mastered})</div>
      <div class="stats-legend-item"><span class="stats-legend-dot" style="background:#fbbf24"></span>Lernt (${learning})</div>
      <div class="stats-legend-item"><span class="stats-legend-dot" style="background:#475569"></span>Neu (${newCount})</div>
    `;

    // Table
    let tableHtml = `
      <div class="stats-table-header">
        <span>Frage</span><span style="text-align:center">Box</span><span style="text-align:center">Status</span>
      </div>
    `;
    rows.forEach(row => {
      tableHtml += `
        <div class="stats-table-row">
          <span class="stats-table-question">${esc(row.question)}</span>
          <span class="stats-table-box">${row.box}</span>
          <span class="stats-table-status ${row.statusClass}">${row.status}</span>
        </div>
      `;
    });
    $('stats-table').innerHTML = tableHtml;
  }

  // ===== HELPERS =====
  function esc(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatText(str) {
    return esc(str).replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
  }

  // ===== EVENT LISTENERS =====
  btnBack.addEventListener('click', goBack);

  btnProfileSwitch.addEventListener('click', () => {
    navStack = [];
    showScreen('profile', false);
  });

  flashcardContainer.addEventListener('click', () => {
    if (!isFlipped) flipCard();
  });

  btnNochmal.addEventListener('click', () => answerCard(false));
  btnGewusst.addEventListener('click', () => answerCard(true));

  btnBackLibrary.addEventListener('click', () => {
    navStack = ['profile'];
    showScreen('library', false);
    renderLibrary();
  });

  btnStats.addEventListener('click', () => {
    renderStats();
    showScreen('stats');
  });

  btnResetProgress.addEventListener('click', () => {
    dialogOverlay.classList.add('visible');
  });

  dialogCancel.addEventListener('click', () => {
    dialogOverlay.classList.remove('visible');
  });

  dialogConfirm.addEventListener('click', () => {
    dialogOverlay.classList.remove('visible');
    if (currentSetId) {
      resetProgress(currentSetId);
      renderStats();
    }
  });

  dialogOverlay.addEventListener('click', (e) => {
    if (e.target === dialogOverlay) dialogOverlay.classList.remove('visible');
  });

  // ===== INIT =====
  function init() {
    initProfiles();

    const saved = localStorage.getItem('lernbox_activeProfile');
    if (saved && PROFILES.find(p => p.name === saved)) {
      selectProfile(saved);
    } else {
      showScreen('profile', false);
    }
  }

  init();
})();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
